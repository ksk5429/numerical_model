name: Op3 CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install openseespy openseespylinux
          pip install pytest pytest-cov

      - name: Run pytest (all tests)
        run: |
          PYTHONUTF8=1 python -m pytest tests/ -v --tb=short \
            --cov=op3 --cov-report=xml --cov-report=term-missing \
            -x --timeout=120
        continue-on-error: false

      - name: Calibration regression
        run: PYTHONUTF8=1 python scripts/calibration_regression.py

      - name: Three-analyses smoke (11 examples)
        run: PYTHONUTF8=1 python scripts/test_three_analyses.py

      - name: DNV-ST-0126 conformance
        run: PYTHONUTF8=1 python scripts/dnv_st_0126_conformance.py --all

      - name: Cross-validation suite
        run: PYTHONUTF8=1 python validation/cross_validations/run_all_cross_validations.py

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 30

      - name: Upload V&V artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vv-artifacts-py${{ matrix.python-version }}
          path: |
            validation/benchmarks/*.json
            validation/cross_validations/all_results.json
          retention-days: 30

  docs:
    name: Sphinx build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Install Sphinx + deps
        run: |
          pip install --upgrade pip
          pip install -r docs/sphinx/requirements.txt
          pip install numpy scipy pandas pyyaml
      - name: Build HTML (warnings = errors)
        run: python -W ignore::DeprecationWarning -m sphinx -W --keep-going -b html docs/sphinx docs/sphinx/_build/html
      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: op3-docs
          path: docs/sphinx/_build/html
          retention-days: 30
