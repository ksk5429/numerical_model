name: Verify Op^3 framework

# Runs on every push and pull request to main. Asserts that:
# 1. All NREL reference models parse structurally
# 2. The power-law capacity fit from the committed database reproduces
#    the dissertation's gamma = 0.61, delta = 1.31 values
# 3. The bundled Gunsan OpenFAST deck files are all present and parseable

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify bundled models and data
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pandas pyyaml pytest

      - name: Verify all NREL reference models parse
        run: |
          python scripts/verify_nrel_models.py

      - name: Run pytest test suite
        run: |
          pytest tests/ -v --tb=short

      - name: Upload verification report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nrel-verification-report
          path: validation/benchmarks/nrel_model_verification.json
          retention-days: 30
