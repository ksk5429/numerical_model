name: op3-studio

on:
  push:
    branches: [main]
    paths:
      - "op3_studio/**"
      - "op3/**"
      - ".github/workflows/op3-studio.yml"
  pull_request:
    paths:
      - "op3_studio/**"
      - "op3/**"

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install op3 + studio deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r op3_studio/backend/requirements.txt
          pip install reportlab
      - name: Run backend tests
        env:
          PYTHONPATH: op3_studio:.
          PYTHONUTF8: "1"
        run: pytest op3_studio/backend/tests/ -v

  frontend:
    name: frontend (vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: op3_studio/frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: op3_studio/frontend/package-lock.json
      - name: Install
        run: npm install --no-fund --no-audit
      - name: Type-check + build
        run: npm run build
      - name: Unit tests
        run: npm test
