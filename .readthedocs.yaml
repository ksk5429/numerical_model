# Read the Docs configuration for Op^3
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

# Build on an Ubuntu 22.04 runner with Python 3.12
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  apt_packages:
    - pandoc      # required by nbsphinx (reserved for future tutorials)

# Sphinx configuration
sphinx:
  configuration: docs/sphinx/conf.py
  fail_on_warning: false          # docstring RST warnings are cosmetic

# Build HTML, PDF, and ePub
formats:
  - pdf
  - epub

# Python dependencies
# Do NOT pip-install the op3 package itself on RTD's Ubuntu runner:
# openseespy has no manylinux wheels and the source build fails.
# The conf.py uses autodoc_mock_imports for openseespy, so docs
# render without the real OpenSees library installed.
python:
  install:
    - requirements: docs/sphinx/requirements.txt
