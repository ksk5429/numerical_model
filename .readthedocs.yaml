# Read the Docs configuration for Op^3
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

# Build on an Ubuntu 22.04 runner with Python 3.12
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

# Sphinx configuration
sphinx:
  configuration: docs/sphinx/conf.py
  fail_on_warning: false          # start loose; tighten once docs are clean

# Build HTML, PDF, and ePub
formats:
  - pdf
  - epub

# Python dependencies
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
    - requirements: docs/sphinx/requirements.txt
