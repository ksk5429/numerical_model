# =============================================================================
# NREL 5MW OC3 Phase I Monopile -- soil profile
# =============================================================================
# Dense sand profile consistent with published NREL 5MW OC3 follow-on
# studies. OC3 Phase I itself used apparent-fixity (rigid base at
# 4.5*D below mudline) rather than explicit soil springs; subsequent
# work added layered soil for SSI studies.
#
# Shear-modulus profile (G) tracks a typical dense-sand stress-
# dependent G_0 = G_ref * sqrt(p'/p_ref) relationship, with p_ref =
# 100 kPa and G_ref ~= 30 MPa at the reference pressure (Zaaijer
# 2006 Table 2 range for North Sea dense sand at OC3 water depths).
# Values rounded to 3 significant figures for calibration stability.
#
# Friction angle (phi) increases with depth reflecting typical
# density / relative density gradients.
# =============================================================================

layers:
  - depth_m: 0.0            # Mudline
    G_Pa: 35.0e6
    su_or_phi: 33.0
    soil_type: "sand"
    notes: "Upper dense sand, phi' = 33 deg"

  - depth_m: 10.0
    G_Pa: 70.0e6
    su_or_phi: 34.0
    soil_type: "sand"
    notes: "Mid dense sand"

  - depth_m: 20.0
    G_Pa: 95.0e6
    su_or_phi: 35.0
    soil_type: "sand"
    notes: "Lower dense sand"

  - depth_m: 36.0           # Skirt-tip layer
    G_Pa: 120.0e6
    su_or_phi: 36.0
    soil_type: "sand"
    notes: "Very dense sand at skirt tip"

provenance:
  status: "REFERENCE-CONSISTENT"
  primary_source: >
    Zaaijer, M. B. (2006). "Foundation modelling to assess dynamic
    behaviour of offshore wind turbines." Applied Ocean Research
    28(1), 45-57. doi:10.1016/j.apor.2006.03.004
  corroborating_sources:
    - "Bisoi, S. & Haldar, S. (2014). Dynamic analysis of offshore wind turbine in clay considering soil-monopile-tower interaction. Soil Dynamics & Earthquake Engineering 63, 19-35."
    - "Darvishi-Alamouti et al. (2017). Natural frequency of offshore wind turbines on rigid and flexible monopiles in cohesionless soils with linear stiffness distribution. Applied Ocean Research 68, 91-102."
  comments: >
    The G-profile reproduces a PISA head stiffness K_HH ~ 1.9e10 N/m
    for D=6 m, L=36 m, which exceeds the legacy
    data/fem_results/K_6x6_oc3_monopile.csv value (K_HH = 8.5e8 N/m).
    The CSV in the legacy data tree appears to derive from an earlier
    apparent-fixity approximation rather than PISA; both give coupled
    f1 within 2% of the Passon 2008 benchmark (0.276 Hz) because the
    NREL 5MW OC3 first mode is tower-dominated.
