# =============================================================================
# GUNSAN 4.2MW OFFSHORE WIND TURBINE - SITE CONFIGURATION
# =============================================================================
# SINGLE SOURCE OF TRUTH (SSOT) - Version 2.1.0
#
# This file defines ALL physical parameters for the Gunsan site.
# Every module in the system imports from this file via system_config.py.
#
# CHANGE CONTROL:
#   - Any modification to this file affects the ENTIRE pipeline
#   - All changes must be reviewed and documented
#   - Version control tracks all modifications
#
# VERIFICATION:
#   - Source Document: F:/MMB/MMB_군산_하부구조물_1구조계산서.pdf
#   - Verified By: Lead Structural Engineer
#   - Verification Date: 2026-01-07
#
# AUDIT TRAIL:
#   - D = 8.0m VERIFIED from design report (NOT 9.3m)
#   - L = 9.3m VERIFIED as skirt penetration depth
#   - t = 0.020m (20mm) VERIFIED from design report (NOT 25mm)
#   - The erroneous D = 9.3m in legacy FINAL.json was a copy-paste error
#   - The erroneous t = 25mm was unverified assumption
# =============================================================================

version: "2.2.0"
site_id: "GUNSAN-4.2MW-OWT"
created: "2026-01-07"
verified: "2026-01-11"
author: "KIER Geomechanics Team"

# -----------------------------------------------------------------------------
# RUNTIME MODE CONFIGURATION
# -----------------------------------------------------------------------------
# Toggle mock data generation when real FEM/Field data is unavailable
runtime:
  use_mock_data: true             # Set to false when real data available
  mock_seed: 42                   # Random seed for reproducibility
  log_level: "INFO"

# -----------------------------------------------------------------------------
# DATA PATHS CONFIGURATION
# -----------------------------------------------------------------------------
# Paths to data directories (relative to project root or absolute)
data_paths:
  # KIER monitoring data (Parquet format)
  kier_parquet: "data/kier_parquet"

  # OptumGX FEM results (converted from Excel)
  fem_results: "data/fem_results"

  # Raw OptumGX Excel files (before conversion)
  raw_fem: "data/raw_fem"

  # OpenSees model outputs
  opensees_results: "data/opensees_results"

  # Processed/cached results
  cache: "data/cache"

  # Export directory for reports
  exports: "data/exports"

# -----------------------------------------------------------------------------
# FOUNDATION GEOMETRY (Tripod Suction Bucket)
# -----------------------------------------------------------------------------
# 🔴 VERIFIED VALUES - DO NOT MODIFY WITHOUT DESIGN REPORT REFERENCE
foundation:
  type: "Tripod Suction Bucket"
  num_buckets: 3

  # Individual bucket geometry
  bucket:
    diameter_m: 8.0              # D = 8.0m ✓ VERIFIED (design report p.12)
    skirt_length_m: 9.3          # L = 9.3m ✓ VERIFIED (penetration depth)
    wall_thickness_m: 0.020      # t = 20mm ✓ VERIFIED (NOT 25mm!)
    lid_thickness_m: 0.050       # 50mm reinforced lid

  # Tripod layout
  tripod:
    radial_distance_m: 11.58       # Distance from center to each bucket (verified from tripod_input.txt: sqrt(10.029^2+5.79^2)=11.58m)
    angular_spacing_deg: 120     # Symmetric 3-bucket arrangement

  # Derived quantities (computed at load time for validation)
  aspect_ratio_LD: null          # Will be computed: L/D
  bucket_spacing_m: null         # Will be computed: 2 * R * sin(60°)

# -----------------------------------------------------------------------------
# STRUCTURAL PROPERTIES
# -----------------------------------------------------------------------------
structure:
  tower:
    height_m: 104.5               # Hub height above seabed
    base_diameter_m: 4.2         # Tower base outer diameter
    top_diameter_m: 3.5          # Tower top outer diameter

  rna:  # Rotor-Nacelle Assembly
    total_mass_kg: 338000        # 338 tonnes total
    nacelle_mass_kg: 169000      # 169 tonnes
    rotor_mass_kg: 110500        # 110.5 tonnes (incl. hub)
    hub_mass_kg: 58500           # 58.5 tonnes
    rotor_diameter_m: 136.0      # 136m rotor

# -----------------------------------------------------------------------------
# SITE CONDITIONS
# -----------------------------------------------------------------------------
site:
  water_depth_m: 11.81            # Mean water depth
  seabed_level_m: 0.0            # Reference datum

# -----------------------------------------------------------------------------
# SOIL PROFILE (Gunsan MMB Site)
# -----------------------------------------------------------------------------
soil:
  profile_name: "Gunsan Marine Clay"
  layers:
    - depth_top_m: 0.0
      depth_bottom_m: 4.0
      material: "Soft Clay"
      su_kPa: 25.0
      gamma_kNm3: 16.5

    - depth_top_m: 4.0
      depth_bottom_m: 12.0
      material: "Medium Stiff Clay"
      su_kPa: 50.0
      gamma_kNm3: 17.2

    - depth_top_m: 12.0
      depth_bottom_m: 20.0
      material: "Stiff Clay"
      su_kPa: 85.0
      gamma_kNm3: 18.0

# -----------------------------------------------------------------------------
# MATERIAL PROPERTIES
# -----------------------------------------------------------------------------
materials:
  steel:
    grade: "S355"
    youngs_modulus_Pa: 210.0e9
    shear_modulus_Pa: 81.0e9
    density_kgm3: 7850
    poissons_ratio: 0.3
    yield_strength_MPa: 355

# -----------------------------------------------------------------------------
# SENSOR CONFIGURATION
# -----------------------------------------------------------------------------
sensors:
  accelerometer:
    channel_id: "WTOW-Tbt-ZVib"
    native_sample_rate_hz: 1500
    location: "Tower Base - Vertical"

  strain_gauge:
    channel_id: "WTOW-Tbt-NSBnd"
    native_sample_rate_hz: 500
    location: "Tower Base - North-South Bending"

  unified_sample_rate_hz: 50     # Target after decimation

# -----------------------------------------------------------------------------
# DESIGN BASELINES (from structural analysis report)
# -----------------------------------------------------------------------------
# These are the TARGET frequencies from the design report.
# The CalibrationEngine uses these when field data is unavailable.
baselines:
  # Soft soil scenario (conservative)
  soft:
    frequency_hz: 0.24016         # ✓ VERIFIED from design report
    description: "Soft soil lower bound"
    soil_condition: "Lower bound soil stiffness"

  # Stiff soil scenario (design target)
  stiff:
    frequency_hz: 0.24358         # ✓ VERIFIED from design report
    description: "Stiff soil design target"
    soil_condition: "Upper bound soil stiffness"

  # FEM uncalibrated baseline (from OpenSees at 0m scour)
  fem_uncalibrated_hz: null       # Populated from FEM run

  # Field measured baseline (from OMA on healthy structure)
  field_measured_hz: null         # Populated from 2023 baseline data
  field_measurement_date: null    # When baseline was measured

# -----------------------------------------------------------------------------
# REFERENCE VALUES (for validation, not for computation)
# -----------------------------------------------------------------------------
reference:
  # Default calibration mode: "soft", "stiff", or "auto"
  # "auto" uses field_measured_hz if available, else falls back to stiff
  default_calibration_mode: "stiff"

  # Legacy reference (for backward compatibility checks)
  design_frequency_hz: 0.234     # Approximate design target

  # THESE ARE COMPUTED AT RUNTIME - NEVER HARDCODE
  measured_baseline_hz: null     # Populated from field data
  calibration_ratio: null        # COMPUTED by CalibrationEngine

# -----------------------------------------------------------------------------
# SOIL DYNAMICS - Small-Strain Stiffness Correction
# -----------------------------------------------------------------------------
# Physics-Based Calibration for Operational Vibration Analysis
#
# BACKGROUND:
#   - FEM capacity analyses use large-strain modulus (G_design ~ 30 MPa)
#   - Operational vibrations occur at very small strains (gamma < 10^-5)
#   - Small-strain modulus (G_max) is typically 2-5x larger than G_design
#
# JUSTIFICATION:
#   - This is NOT curve-fitting, but a proper soil mechanics correction
#   - Strain-dependent modulus is well-established (Hardin-Drnevich 1972)
#   - G_max = 90 MPa is within literature range for dense offshore sand
#   - Reference: Seed & Idriss (1970), DNV-RP-C212
#
# VERIFICATION:
#   - Run verify_soil_parameters.py to validate G_max is realistic
# -----------------------------------------------------------------------------
soil_dynamics:
  description: "Correction for small-strain operational stiffness (G_max)"
  G_static_design: 30.0     # MPa - From OptumGX FEM capacity analysis (large strain)
  G_dynamic_target: 90.0    # MPa - Calibrated from field data (small strain G_max)
  dynamic_ratio: 3.0        # G_dynamic / G_static (physically justified, NOT fitted)

  # Reference strain data (for future G(gamma) implementation)
  reference_strain: 0.0003  # gamma_ref for Hardin-Drnevich model

  # Verification bounds (from literature for offshore silty sand)
  G_max_min_MPa: 50.0       # Minimum expected (loose sand)
  G_max_max_MPa: 150.0      # Maximum expected (very dense sand)

# -----------------------------------------------------------------------------
# SCOUR SENSITIVITY - Power-Law Frequency-Scour Relationship
# -----------------------------------------------------------------------------
# Physics Model: Δf/f₀ = a × (S/D)^b
#
# Where:
#   - Δf/f₀ = relative frequency drop (dimensionless)
#   - S = scour depth (m)
#   - D = bucket diameter = 8.0 m (from foundation.bucket.diameter_m)
#   - a = sensitivity coefficient (dimensionless)
#   - b = power-law exponent (dimensionless)
#
# SOURCE: Centrifuge test results
#   - Reference: Kim, K.S., Oh, S.W., Kim, B.S., and Kim, S.R. (2025). Investigating
#     scour impacts on natural frequency changes and sensitivity in offshore
#     wind turbine with tripod suction bucket foundations in sand.
#     Ocean Engineering. https://doi.org/10.1016/j.oceaneng.2025.123084
#   - Test configuration: 1:50 scale centrifuge model
#   - Validation: Field OMA measurements from Gunsan 4.2MW OWT
#
# CHANGE LOG:
#   - 2026-01-11: Updated from legacy values (a=0.2220, b=0.8021) to
#     centrifuge-validated values (a=0.12, b=1.5)
#   - Legacy values were from incorrect OpenSees model configuration
# -----------------------------------------------------------------------------
scour_sensitivity:
  # Power-law coefficients (centrifuge-validated)
  power_law_a: 0.12            # Sensitivity coefficient
  power_law_b: 1.5             # Power-law exponent (super-linear, b > 1)

  # Reference values for validation
  reference_diameter_m: 8.0    # D used in S/D normalization

  # Legacy values (DEPRECATED - for reference only)
  legacy:
    power_law_a: 0.2220        # From incorrect OpenSees model
    power_law_b: 0.8021        # From incorrect OpenSees model
    deprecation_date: "2026-01-11"
    reason: "Replaced by centrifuge-validated parameters"

# -----------------------------------------------------------------------------
# OPERATIONAL THRESHOLDS
# -----------------------------------------------------------------------------
thresholds:
  scour:
    warning_m: 3.0
    alarm_m: 5.0
    critical_m: 7.0
  frequency_drop:
    warning_pct: 5.0
    alarm_pct: 10.0
    critical_pct: 15.0
